name: Auto Release & Sync

on:
  push:
    branches:
      - master
    paths:
      - 'CHANGELOG.md'

jobs:
  release-manager:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Process Versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 注意：gh 工具建议使用 GH_TOKEN 环境变量
        run: |
          # 1. 提取所有符合 ## [x.y.z] 格式的版本号
          ALL_VERSIONS=$(grep -oP '^## \[\K[^\]]+' CHANGELOG.md)

          for VER in $ALL_VERSIONS; do
            TAG_NAME="v$VER"
            
            # 2. 提取当前版本的内容块
            # 逻辑：匹配当前版本标题到下一个 ## 标题之前
            sed -n "/^## \[$VER\]/,/^## /p" CHANGELOG.md | sed '1d;$d' > current_note.md
            
            # 容错：如果 current_note.md 为空（例如是最后一个版本没有后续 ##），重新提取
            if [ ! -s current_note.md ]; then
                sed -n "/^## \[$VER\]/,\$p" CHANGELOG.md | sed '1d' > current_note.md
            fi

            # 3. 检查 Release 状态
            # 检查 Tag 是否存在
            TAG_EXISTS=false
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then TAG_EXISTS=true; fi
            
            # 检查 Release 是否已存在
            RELEASE_EXISTS=false
            if gh release view "$TAG_NAME" >/dev/null 2>&1; then RELEASE_EXISTS=true; fi

            # 4. 核心逻辑执行
            if [ "$TAG_EXISTS" = "true" ]; then
                if [ "$RELEASE_EXISTS" = "false" ]; then
                    echo ">>> 发现 Tag $TAG_NAME 但无 Release，正在创建..."
                    gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file current_note.md
                else
                    # 如果你想同步更新已有的 Release Note，取消下面注释
                    # echo ">>> $TAG_NAME 已存在，同步更新 Release Note..."
                    # gh release edit "$TAG_NAME" --notes-file current_note.md
                    echo ">>> $TAG_NAME 已存在 Release，跳过。"
                fi
            else
                echo ">>> 未发现 Tag $TAG_NAME，请确保先打 Tag 再推 CHANGELOG，或手动触发。"
            fi
          done